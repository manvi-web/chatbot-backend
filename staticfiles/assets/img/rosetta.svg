<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Rosetta: red/coral protein design -->
  <!-- Designed protein backbone -->
  <path d="M8 36 C10 32 14 30 16 26 C18 22 16 18 20 16 C24 14 28 18 30 14 C32 10 36 10 40 12" stroke="#dc2626" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Side chains -->
  <line x1="16" y1="26" x2="10" y2="20" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20" y1="16" x2="22" y2="8"  stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30" y1="14" x2="36" y2="20" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Designed residue highlight -->
  <circle cx="24" cy="22" r="5" fill="#dc2626" opacity="0.15"/>
  <!-- Key residue atoms -->
  <circle cx="8"  cy="36" r="3.5" fill="#b91c1c"/>
  <circle cx="16" cy="26" r="3.5" fill="#dc2626"/>
  <circle cx="20" cy="16" r="4"   fill="#ef4444"/>
  <circle cx="30" cy="14" r="3.5" fill="#dc2626"/>
  <circle cx="40" cy="12" r="3"   fill="#b91c1c"/>
  <!-- Side chain tips -->
  <circle cx="10" cy="20" r="2.5" fill="#f87171"/>
  <circle cx="22" cy="7"  r="2.5" fill="#f87171"/>
  <circle cx="36" cy="20" r="2.5" fill="#f87171"/>
  <!-- Energy funnel at bottom -->
  <path d="M14 40 Q24 44 34 40" stroke="#fca5a5" stroke-width="1.5" fill="none" stroke-dasharray="2 2"/>
</svg>
