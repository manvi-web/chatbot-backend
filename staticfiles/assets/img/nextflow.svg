<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Nextflow: green pipeline with dataflow arrows -->
  <defs>
    <linearGradient id="nfg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Process boxes -->
  <rect x="4"  y="20" width="10" height="8" rx="2.5" fill="url(#nfg)"/>
  <rect x="19" y="20" width="10" height="8" rx="2.5" fill="url(#nfg)"/>
  <rect x="34" y="20" width="10" height="8" rx="2.5" fill="url(#nfg)"/>
  <!-- Channel arrows -->
  <path d="M14 24 L19 24" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="18,21.5 22,24 18,26.5" fill="#4ade80"/>
  <path d="M29 24 L34 24" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="33,21.5 37,24 33,26.5" fill="#4ade80"/>
  <!-- Parallel channels -->
  <rect x="19" y="10" width="10" height="6" rx="2" fill="#15803d" opacity="0.7"/>
  <rect x="19" y="32" width="10" height="6" rx="2" fill="#15803d" opacity="0.7"/>
  <line x1="9" y1="20" x2="19" y2="16" stroke="#86efac" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="28" x2="19" y2="35" stroke="#86efac" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="16" x2="39" y2="20" stroke="#86efac" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="35" x2="39" y2="28" stroke="#86efac" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Node highlights -->
  <rect x="5" y="21.5" width="3" height="1.5" rx="0.5" fill="#dcfce7" opacity="0.7"/>
  <rect x="20" y="21.5" width="3" height="1.5" rx="0.5" fill="#dcfce7" opacity="0.7"/>
  <rect x="35" y="21.5" width="3" height="1.5" rx="0.5" fill="#dcfce7" opacity="0.7"/>
</svg>
