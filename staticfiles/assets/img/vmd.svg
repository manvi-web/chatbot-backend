<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- VMD: purple molecular dynamics visualization -->
  <!-- Backbone ribbon -->
  <path d="M8 38 Q14 30 20 24 Q26 18 32 14 Q38 10 40 8" stroke="#6b21a8" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Atoms along backbone -->
  <circle cx="8"  cy="38" r="4" fill="#7c3aed"/>
  <circle cx="16" cy="30" r="3.5" fill="#8b5cf6"/>
  <circle cx="24" cy="24" r="4.5" fill="#6b21a8"/>
  <circle cx="32" cy="16" r="3.5" fill="#8b5cf6"/>
  <circle cx="40" cy="9"  r="3"   fill="#7c3aed"/>
  <!-- Side chains -->
  <line x1="16" y1="30" x2="10" y2="22" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="10" cy="22" r="2.5" fill="#a855f7"/>
  <line x1="24" y1="24" x2="30" y2="32" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="30" cy="32" r="2.5" fill="#a855f7"/>
  <line x1="32" y1="16" x2="26" y2="10" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="26" cy="10" r="2.5" fill="#c084fc"/>
  <!-- highlight on central atom -->
  <circle cx="22" cy="22" r="1.5" fill="#e9d5ff" opacity="0.8"/>
</svg>
