<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- AMBER: amber/gold color, force field energy surface -->
  <defs>
    <radialGradient id="ag" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
  </defs>
  <!-- Energy surface contours -->
  <ellipse cx="24" cy="28" rx="18" ry="10" stroke="#b45309" stroke-width="1.5" fill="none" opacity="0.4"/>
  <ellipse cx="24" cy="26" rx="13" ry="7"  stroke="#b45309" stroke-width="1.5" fill="none" opacity="0.6"/>
  <ellipse cx="24" cy="24" rx="8"  ry="4"  stroke="#92400e" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Central atom at energy minimum -->
  <circle cx="24" cy="22" r="7" fill="url(#ag)"/>
  <circle cx="21" cy="20" r="2.2" fill="#fef3c7" opacity="0.6"/>
  <!-- Surrounding atoms with bonds -->
  <line x1="24" y1="15" x2="24" y2="9"  stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="18" x2="36" y2="13" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="26" x2="36" y2="31" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="18" x2="12" y2="13" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="8"  r="3.5" fill="#d97706"/>
  <circle cx="37" cy="12" r="3"   fill="#d97706"/>
  <circle cx="37" cy="32" r="3"   fill="#d97706"/>
  <circle cx="11" cy="12" r="3"   fill="#d97706"/>
</svg>
