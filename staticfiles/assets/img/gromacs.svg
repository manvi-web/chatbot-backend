  <circle cx="24" cy="24" r="2.5" fill="#5eead4" opacity="0.8"/>
  <!-- 6 surrounding atoms -->
  <circle cx="24" cy="10" r="4.5" fill="#0f9d8b"/>
  <circle cx="24" cy="38" r="4.5" fill="#0f9d8b"/>
  <circle cx="10" cy="24" r="4.5" fill="#0f9d8b"/>
  <circle cx="38" cy="24" r="4.5" fill="#0f9d8b"/>
  <circle cx="13" cy="13" r="3.5" fill="#14b8a6"/>
  <circle cx="35" cy="35" r="3.5" fill="#14b8a6"/>
  <!-- Bonds -->
  <line x1="24" y1="18" x2="24" y2="14.5" stroke="#0d7d6e" stroke-width="2.5"/>
  <line x1="24" y1="30" x2="24" y2="33.5" stroke="#0d7d6e" stroke-width="2.5"/>
  <line x1="18" y1="24" x2="14.5" y2="24" stroke="#0d7d6e" stroke-width="2.5"/>
