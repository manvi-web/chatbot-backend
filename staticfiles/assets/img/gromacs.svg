  <line x1="28.3" y1="28.3" x2="31.5" y2="31.5" stroke="#0d7d6e" stroke-width="2"/>
  <!-- velocity arrows -->
  <path d="M38 10 L42 10 L40 8 M42 10 L40 12" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M6 38 L10 38 L8 36 M10 38 L8 40" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" fill="none"/>
