<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- MOE: navy blue, molecular surface/SAR -->
  <!-- Molecular surface blob -->
  <path d="M12 30 Q8 22 14 16 Q20 8 28 10 Q36 12 40 20 Q44 28 38 34 Q32 42 24 40 Q14 38 12 30 Z" fill="#1e3a5f" opacity="0.12"/>
  <path d="M14 29 Q10 22 16 17 Q22 10 29 12 Q36 14 39 21 Q42 28 37 33 Q31 40 24 38 Q15 36 14 29 Z" stroke="#1e3a5f" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Molecule bonds (2D structure) -->
  <line x1="18" y1="28" x2="24" y2="20" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="32" y2="22" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="34" y2="30" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="34" y1="30" x2="28" y2="36" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="28" y1="36" x2="18" y2="34" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="18" y1="34" x2="18" y2="28" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Double bond -->
  <line x1="24" y1="18" x2="32" y2="20" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Substituent -->
  <line x1="24" y1="20" x2="20" y2="14" stroke="#2d5a8e" stroke-width="2" stroke-linecap="round"/>
  <!-- Atoms -->
  <circle cx="18" cy="28" r="3.2" fill="#1e40af"/>
  <circle cx="24" cy="20" r="3"   fill="#1e3a5f"/>
  <circle cx="32" cy="22" r="3"   fill="#1e40af"/>
  <circle cx="34" cy="30" r="2.8" fill="#2d5a8e"/>
  <circle cx="20" cy="13" r="3"   fill="#3b82f6"/>
</svg>
