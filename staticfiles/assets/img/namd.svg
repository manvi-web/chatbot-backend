<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- NAMD: orange/red parallel MD - membrane bilayer style -->
  <!-- Upper lipid heads -->
  <circle cx="10" cy="10" r="4" fill="#ea580c"/>
  <circle cx="20" cy="10" r="4" fill="#ea580c"/>
  <circle cx="30" cy="10" r="4" fill="#ea580c"/>
  <circle cx="40" cy="10" r="4" fill="#ea580c"/>
  <!-- Upper tails -->
  <line x1="10" y1="14" x2="10" y2="22" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="20" y2="22" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="14" x2="30" y2="22" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="14" x2="40" y2="22" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lower tails -->
  <line x1="10" y1="26" x2="10" y2="34" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="26" x2="20" y2="34" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="26" x2="30" y2="34" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="26" x2="40" y2="34" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lower lipid heads -->
  <circle cx="10" cy="38" r="4" fill="#c2410c"/>
  <circle cx="20" cy="38" r="4" fill="#c2410c"/>
  <circle cx="30" cy="38" r="4" fill="#c2410c"/>
  <circle cx="40" cy="38" r="4" fill="#c2410c"/>
  <!-- Central protein crossing membrane -->
  <rect x="21" y="18" width="6" height="12" rx="3" fill="#7c3aed" opacity="0.9"/>
</svg>
