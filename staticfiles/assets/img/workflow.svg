<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Workflow parent: amber pipeline DAG -->
  <!-- Nodes -->
  <rect x="4"  y="20" width="10" height="8" rx="3" fill="#92400e"/>
  <rect x="19" y="8"  width="10" height="8" rx="3" fill="#b45309"/>
  <rect x="19" y="32" width="10" height="8" rx="3" fill="#b45309"/>
  <rect x="34" y="20" width="10" height="8" rx="3" fill="#92400e"/>
  <!-- Edges -->
  <line x1="14" y1="24" x2="19" y2="12" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="24" x2="19" y2="36" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="12" x2="34" y2="24" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="36" x2="34" y2="24" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow heads -->
  <polygon points="19,12 16,9 22,9" fill="#d97706"/>
  <polygon points="19,36 16,39 22,39" fill="#d97706"/>
  <polygon points="34,24 31,21 31,27" fill="#d97706"/>
  <!-- Node highlights -->
  <rect x="5"  y="21" width="4" height="2" rx="1" fill="#fef3c7" opacity="0.5"/>
  <rect x="20" y="9"  width="4" height="2" rx="1" fill="#fef3c7" opacity="0.5"/>
</svg>
