  <ellipse cx="24" cy="25" rx="11" ry="10" fill="#f0a500" opacity="0.15"/>
  <!-- Hat -->
  <rect x="10" y="14" width="28" height="6" rx="2" fill="#c0392b"/>
  <rect x="14" y="8"  width="20" height="8" rx="3" fill="#d33833"/>
