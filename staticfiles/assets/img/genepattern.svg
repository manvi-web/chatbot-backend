<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- GenePattern: teal, genomics portal -->
  <rect x="6" y="6" width="36" height="36" rx="6" fill="#0f766e" opacity="0.1" stroke="#0f766e" stroke-width="1.5"/>
  <!-- Heatmap grid -->
  <rect x="10" y="10" width="6" height="6" rx="1" fill="#0d9488" opacity="0.9"/>
  <rect x="18" y="10" width="6" height="6" rx="1" fill="#f97316" opacity="0.8"/>
  <rect x="26" y="10" width="6" height="6" rx="1" fill="#0d9488" opacity="0.5"/>
  <rect x="34" y="10" width="4" height="6" rx="1" fill="#dc2626" opacity="0.7"/>
  <rect x="10" y="18" width="6" height="6" rx="1" fill="#dc2626" opacity="0.7"/>
  <rect x="18" y="18" width="6" height="6" rx="1" fill="#0d9488" opacity="0.9"/>
  <rect x="26" y="18" width="6" height="6" rx="1" fill="#f97316" opacity="0.6"/>
  <rect x="34" y="18" width="4" height="6" rx="1" fill="#0d9488" opacity="0.4"/>
