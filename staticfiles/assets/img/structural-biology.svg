<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Alpha helix (ribbon coil) -->
  <path d="M8 12 C10 9 14 9 14 12 C14 15 10 15 10 18 C10 21 14 21 14 24 C14 27 10 27 10 30 C10 33 14 33 14 36" stroke="#2d5a8e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Beta strands (arrows) -->
  <rect x="20" y="13" width="10" height="4" rx="1" fill="#4a7ab5"/>
  <polygon points="30,13 35,15 30,17" fill="#4a7ab5"/>
  <rect x="20" y="22" width="10" height="4" rx="1" fill="#4a7ab5"/>
  <polygon points="30,22 35,24 30,26" fill="#4a7ab5"/>
  <rect x="20" y="31" width="10" height="4" rx="1" fill="#4a7ab5"/>
  <polygon points="30,31 35,33 30,35" fill="#4a7ab5"/>
  <!-- Loop connecting helix to sheet -->
  <path d="M14 24 Q17 24 20 15" stroke="#93c5fd" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M14 30 Q17 30 20 24" stroke="#93c5fd" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Ligand sphere -->
  <circle cx="40" cy="24" r="5" fill="#1e3a5f" opacity="0.9"/>
  <circle cx="38" cy="22" r="1.8" fill="#bfdbfe" opacity="0.7"/>
</svg>
