<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- PyMOL: blue molecular sphere with bonds -->
  <circle cx="24" cy="24" r="18" fill="#1a4a8a" opacity="0.08"/>
  <!-- Central atom -->
  <circle cx="24" cy="24" r="7" fill="#1a4a8a"/>
  <circle cx="21.5" cy="21.5" r="2" fill="#4a80c4" opacity="0.7"/>
  <!-- Bond lines -->
  <line x1="24" y1="17" x2="24" y2="8" stroke="#1a4a8a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="31" x2="24" y2="40" stroke="#1a4a8a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="17" y1="24" x2="8"  y2="24" stroke="#1a4a8a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="24" x2="40" y2="24" stroke="#1a4a8a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="19" x2="12" y2="12" stroke="#1a4a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="29" x2="36" y2="36" stroke="#1a4a8a" stroke-width="2" stroke-linecap="round"/>
  <!-- Outer atoms -->
  <circle cx="24" cy="7"  r="4.5" fill="#2e6cc7"/>
  <circle cx="24" cy="41" r="4.5" fill="#2e6cc7"/>
  <circle cx="7"  cy="24" r="4.5" fill="#2e6cc7"/>
  <circle cx="41" cy="24" r="4.5" fill="#2e6cc7"/>
  <circle cx="11" cy="11" r="3.5" fill="#5590e0"/>
  <circle cx="37" cy="37" r="3.5" fill="#5590e0"/>
</svg>
