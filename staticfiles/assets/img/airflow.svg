<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Apache Airflow: dark blue DAG scheduler -->
  <defs>
    <linearGradient id="afg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#017cee"/>
      <stop offset="100%" stop-color="#00ad46"/>
    </linearGradient>
  </defs>
  <!-- DAG nodes -->
  <circle cx="8"  cy="24" r="4.5" fill="#017cee"/>
  <circle cx="22" cy="12" r="4.5" fill="#017cee"/>
  <circle cx="22" cy="36" r="4.5" fill="#00ad46"/>
  <circle cx="36" cy="24" r="4.5" fill="url(#afg2)"/>
  <!-- Edges -->
  <line x1="12" y1="22" x2="18" y2="14" stroke="#017cee" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="26" x2="18" y2="34" stroke="#00ad46" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="14" x2="32" y2="22" stroke="#017cee" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="34" x2="32" y2="26" stroke="#00ad46" stroke-width="2" stroke-linecap="round"/>
  <!-- Schedule clock -->
  <circle cx="40" cy="10" r="6" fill="#017cee" opacity="0.15" stroke="#017cee" stroke-width="1.5"/>
  <line x1="40" y1="7"  x2="40" y2="10" stroke="#017cee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="10" x2="43" y2="10" stroke="#017cee" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Node highlights -->
  <circle cx="8"  cy="24" r="1.5" fill="#bfdbfe" opacity="0.8"/>
  <circle cx="36" cy="24" r="1.5" fill="#bbf7d0" opacity="0.8"/>
</svg>
